<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>会員証</title>
  <style>
    :root{ --emerald:#06c755; }
    *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body{ height:100%; }
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic UI",sans-serif;
      min-height:100dvh; display:flex; align-items:center; justify-content:center;
      padding:24px; color:#fff; overflow:hidden; position:relative;
      background:radial-gradient(120% 120% at 0% 0%, #0f3d2e 0%, #08241b 45%, #05130e 100%);
    }
    .orb{ position:fixed; border-radius:50%; filter:blur(60px); opacity:.5; z-index:0; animation:float 14s ease-in-out infinite; }
    .orb.a{ width:320px; height:320px; top:-80px; left:-60px; background:radial-gradient(circle,#0bd47a,transparent 70%); }
    .orb.b{ width:280px; height:280px; bottom:-70px; right:-50px; background:radial-gradient(circle,#0a8f5c,transparent 70%); animation-delay:-6s; }
    @keyframes float{ 0%,100%{ transform:translate(0,0) scale(1);} 50%{ transform:translate(20px,-24px) scale(1.08);} }

    .stage{ position:relative; z-index:1; width:100%; max-width:380px; }

    .card{
      position:relative; border-radius:24px; padding:26px 24px 22px; overflow:hidden;
      background:linear-gradient(150deg, rgba(255,255,255,.16), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.22);
      box-shadow:0 24px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.25);
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      opacity:0; transform:translateY(18px) scale(.98); animation:enter .7s cubic-bezier(.2,.8,.2,1) forwards;
    }
    @keyframes enter{ to{ opacity:1; transform:none; } }
    .card::before{
      content:""; position:absolute; top:0; left:-60%; width:55%; height:100%;
      background:linear-gradient(100deg,transparent,rgba(255,255,255,.35),transparent);
      transform:skewX(-18deg); animation:shine 5.5s ease-in-out 1.1s infinite;
    }
    @keyframes shine{ 0%{ left:-60%;} 22%,100%{ left:130%; } }

    .head{ display:flex; align-items:center; justify-content:space-between; }
    .brand{ display:flex; align-items:center; gap:9px; }
    .logo{ width:30px; height:30px; border-radius:9px; display:grid; place-items:center;
      background:linear-gradient(135deg,#0bd47a,#06c755); box-shadow:0 4px 12px rgba(6,199,85,.5);
      font-weight:900; font-size:15px; color:#03150e; }
    .brand .t{ font-size:12px; letter-spacing:.18em; font-weight:700; opacity:.9; }

    .tier{ font-size:11px; font-weight:800; letter-spacing:.12em; padding:5px 11px; border-radius:999px;
      border:1px solid rgba(255,255,255,.3); background:rgba(0,0,0,.18); }
    .tier.member{ color:#cfeee0; }
    .tier.bronze{ color:#4a2f1c; background:linear-gradient(135deg,#e6b98e,#c98a5c); border-color:transparent; }
    .tier.silver{ color:#2b333a; background:linear-gradient(135deg,#eef3f6,#c3ccd2); border-color:transparent; }
    .tier.gold{ color:#3a2c07; background:linear-gradient(135deg,#f6e4b0,#e0b558); border-color:transparent; box-shadow:0 4px 14px rgba(224,181,88,.45); }

    .name{ margin-top:24px; font-size:15px; opacity:.75; letter-spacing:.02em; }
    .name b{ display:block; font-size:27px; font-weight:800; letter-spacing:.01em; margin-top:2px; }

    .stats{ margin-top:22px; display:flex; gap:12px; }
    .stat{ flex:1; background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.12); border-radius:15px; padding:14px 12px; text-align:center; }
    .stat .n{ font-size:30px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; }
    .stat .u{ font-size:11px; opacity:.72; margin-top:6px; letter-spacing:.08em; }

    .benefit{ margin-top:14px; display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:14px;
      background:linear-gradient(135deg, rgba(232,195,122,.22), rgba(232,195,122,.08)); border:1px solid rgba(232,195,122,.5); }
    .benefit .ic{ font-size:18px; }
    .benefit .tx{ font-size:13px; font-weight:700; color:#ffe9bf; }
    .benefit.none{ background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.12); }
    .benefit.none .tx{ color:rgba(255,255,255,.6); font-weight:600; }

    .foot{ margin-top:18px; display:flex; align-items:center; justify-content:space-between; font-size:10px; letter-spacing:.14em; opacity:.55; }

    .status{ text-align:center; color:rgba(255,255,255,.85); font-size:14px; padding:60px 20px; z-index:1; position:relative; }
    .spinner{ width:34px; height:34px; margin:0 auto 16px; border-radius:50%; border:3px solid rgba(255,255,255,.2); border-top-color:#0bd47a; animation:spin 1s linear infinite; }
    @keyframes spin{ to{ transform:rotate(360deg); } }
    .skeleton{ border-radius:24px; height:300px; border:1px solid rgba(255,255,255,.1);
      background:linear-gradient(110deg, rgba(255,255,255,.06) 30%, rgba(255,255,255,.14) 50%, rgba(255,255,255,.06) 70%);
      background-size:200% 100%; animation:sk 1.3s linear infinite; }
    @keyframes sk{ to{ background-position:-200% 0; } }
  </style>
</head>
<body>
  <div class="orb a"></div><div class="orb b"></div>
  <div class="stage" id="stage"><div class="skeleton"></div></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const LIFF_ID = "2010776284-CELttCxq";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzOCpwIacyZhL5LjXLL8JZV41u1aFSbuNrfQ1CFcc9DjaeO9r_v4sDnT6YACoh-AoB2uw/exec";

    const stage = document.getElementById('stage');
    function esc(s){ return String(s).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
    function status(msg,spin){ stage.innerHTML =
      '<div class="status">'+(spin?'<div class="spinner"></div>':'')+esc(msg)+'</div>'; }

    function tierOf(v){
      if(v>=20) return {k:'gold',  t:'GOLD'};
      if(v>=10) return {k:'silver',t:'SILVER'};
      if(v>=5)  return {k:'bronze',t:'BRONZE'};
      return {k:'member', t:'MEMBER'};
    }
    function countUp(el,to){
      const dur=800, t0=performance.now();
      (function step(now){
        const p=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-p,3);
        el.textContent=Math.round(to*e);
        if(p<1) requestAnimationFrame(step);
      })(t0);
    }

    function render(d){
      const tier=tierOf(Number(d.visits)||0);
      const hasB=(Number(d.benefits)||0)>0;
      stage.innerHTML =
        '<div class="card">'+
          '<div class="head">'+
            '<div class="brand"><div class="logo">N</div><div class="t">MEMBERS CARD</div></div>'+
            '<div class="tier '+tier.k+'">'+tier.t+'</div>'+
          '</div>'+
          '<div class="name">お名前<b>'+esc(d.name)+' 様</b></div>'+
          '<div class="stats">'+
            '<div class="stat"><div class="n" id="pt">0</div><div class="u">POINTS</div></div>'+
            '<div class="stat"><div class="n" id="vs">0</div><div class="u">VISITS</div></div>'+
          '</div>'+
          '<div class="benefit '+(hasB?'':'none')+'">'+
            '<div class="ic">'+(hasB?'🎁':'✨')+'</div>'+
            '<div class="tx">'+(hasB?('利用可能な特典が '+d.benefits+' 件あります'):'特典まであと少し（5回来店ごと）')+'</div>'+
          '</div>'+
          '<div class="foot"><span>NITO MEMBERSHIP</span><span>LINE 会員証</span></div>'+
        '</div>';
      countUp(document.getElementById('pt'), Number(d.points)||0);
      countUp(document.getElementById('vs'), Number(d.visits)||0);
    }

    window.__onCardData = function(d){ render(d); };

    async function main(){
      if(!LIFF_ID || LIFF_ID.indexOf('ここに')>=0 || GAS_URL.indexOf('ここに')>=0){ status('設定が未完了です'); return; }
      try{
        await liff.init({ liffId:LIFF_ID });
        if(!liff.isLoggedIn()){ liff.login(); return; }
        const p=await liff.getProfile();
        const s=document.createElement('script');
        s.src=GAS_URL+'?userId='+encodeURIComponent(p.userId)+'&callback=__onCardData';
        s.onerror=function(){ status('データを取得できませんでした'); };
        document.body.appendChild(s);
      }catch(e){ status('エラー：'+(e&&e.message?e.message:e)); }
    }
    main();
  </script>
</body>
</html>
